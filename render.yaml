# Render Blueprint — single FastAPI web service (lean, free tier).
# Generation runs inline via FastAPI BackgroundTasks (JOB_QUEUE=inline), so no separate
# worker or Redis is needed. Secrets (sync: false) are set in the Render dashboard; the
# Firebase service-account JSON is mounted as a Secret File at
# /etc/secrets/firebase-admin.json. See docs/SECURITY.md §14.
#
# NOTE: `plan: free` spins the service down after ~15 min idle (first request then cold-starts
# ~50s, and a long generation job can be killed mid-run if it sleeps). Bump to `plan: starter`
# for an always-on, demo-reliable service.
services:
  - type: web
    # MUST match the service name in the Render dashboard. Render matches blueprint entries
    # to existing services BY NAME — a mismatch makes the next sync provision a duplicate
    # service with no `sync: false` secrets instead of updating this one.
    #
    # The onrender.com subdomain is derived from this name at CREATION and is never changed
    # by a later rename, so the public API is https://originshot-api.onrender.com.
    name: originshot-api
    runtime: docker
    dockerfilePath: ./infra/Dockerfile.backend
    dockerContext: .
    plan: free
    healthCheckPath: /healthz
    # Only redeploy when backend/infra actually change — a frontend-only push is ignored.
    buildFilter:
      paths:
        - backend/**
        - infra/**
        - render.yaml
      ignoredPaths:
        - frontend/**
        - docs/**
    envVars:
      - key: APP_ENV
        value: production
      - key: AUTH_DEV_BYPASS
        value: "false"
      - key: JOB_QUEUE
        value: inline
      # Firebase service account is uploaded as a Render Secret File (see steps).
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /etc/secrets/firebase-admin.json
      # Non-secret; the S3 endpoint is derived as s3.<region>.backblazeb2.com.
      - key: B2_REGION
        value: eu-central-003
      # Transparency-ledger immutability via B2 Object Lock. 0 = off (default) until the
      # bucket has file lock enabled AND B2_KEY_ID carries writeFileRetentions. Set to a
      # retention period (e.g. 365) once that infra is in place; the app then locks every new
      # checkpoint + audit report. See README "Backblaze B2 capabilities used".
      - key: B2_OBJECT_LOCK_DAYS
        value: "0"
      # Ed25519 signing seed (hex) for transparency checkpoints, audit + dispute reports.
      # Verifiable against the repo-committed public key. Set in the dashboard (sync: false)
      # — a signing key is a secret. Unset ⇒ artefacts publish unsigned.
      - key: SIGNING_PRIVATE_KEY
        sync: false
      # Mock generation fabricates assets by copying the user's upload and labelling them
      # provider="mock-dev" — indistinguishable from real generations in analytics, the
      # admin dashboard, and the credit ledger. It already defaults to false in code; pinned
      # here so production can never inherit it from a stray environment value.
      - key: MOCK_GENERATION_ENABLED
        value: "false"
      # Credit policy (USD). The daily quota caps request volume; credits cap spend, which a
      # request count cannot — one video pack costs roughly 10x an image pack.
      - key: SIGNUP_CREDIT_GRANT
        value: "5.0"
      - key: LOW_BALANCE_THRESHOLD
        value: "1.0"
      # ── Set these in the dashboard (Environment) ──
      - key: PUBLIC_BASE_URL        # https://originshot-api.onrender.com
        sync: false
      # Comma-separated exact-match allowlist — no trailing slash, no quotes.
      - key: ALLOWED_ORIGINS        # https://originshot.vercel.app
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: B2_KEY_ID
        sync: false
      - key: B2_APP_KEY
        sync: false
      - key: B2_BUCKET
        sync: false
      - key: GMI_API_KEY
        sync: false
      # OpenAI images (gpt-image-1) — the second image-edit provider. With GMI's request
      # queue out of credit, this is what actually serves generations today; the cross-
      # provider chain (originshot_pipelines/providers.py) falls across to it automatically.
      # Set the value in the dashboard.
      - key: OPENAI_API_KEY
        sync: false
      # "auto" walks the provider chain (GMI then OpenAI), using the first CONFIGURED one and
      # falling across on a real failure. Pin to "openai-dalle" to skip GMI's 402 round-trip
      # entirely while its balance is zero; set back to "auto" after a GMI top-up.
      - key: IMAGE_PROVIDER
        value: auto
      # REQUIRED to reach the admin dashboard. Comma-separated emails granted the admin role
      # on their first authenticated request (verified emails only). Without this there is no
      # way to mint the first admin in production: every role-granting endpoint already
      # requires being one. Kept out of the blueprint (sync: false) because it is an
      # authorization control, not just config — set it in the dashboard.
      - key: ADMIN_EMAILS         # e.g. you@example.com
        sync: false
